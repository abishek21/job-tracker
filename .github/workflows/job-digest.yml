name: Job Digest for Revathi

on:
  schedule:
    # 8am Dublin time (UTC+1 in summer, UTC in winter)
    - cron: '0 7 * * *'   # 7am UTC = 8am Dublin (IST)
    - cron: '0 17 * * *'  # 5pm UTC = 6pm Dublin (IST)
  workflow_dispatch:  # Manual trigger button

jobs:
  send-digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Send job digest email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
        run: node send-digest-cloud.js
